openapi: 3.0.0
info:
  title: API Fédération de collectivités agricoles
  description: API pour la gestion des collectivités agricoles
  version: 2.0.0

servers:
  - url: https://api.federation-agricole.mg/v1

paths:

  /collectivites:
    post:
      summary: Ouverture d'une nouvelle collectivité
      description: |
        Conditions :
        - Minimum 10 membres
        - Dont 5 avec au moins 6 mois d’ancienneté
        - Tous les postes spécifiques doivent être occupés
        - Autorisation de la fédération obligatoire
      operationId: ouvrirCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nom
                - ville
                - specialite
                - autorisationFederation
                - membres
              properties:
                nom:
                  type: string
                ville:
                  type: string
                specialite:
                  type: string
                autorisationFederation:
                  type: string
                membres:
                  type: array
                  minItems: 10
                  items:
                    type: object
                    required:
                      - membreId
                      - poste
                      - ancienneteMois
                    properties:
                      membreId:
                        type: string
                      ancienneteMois:
                        type: integer
                        minimum: 0
                        description: Doit être ≥ 6 pour au moins 5 membres
                      poste:
                        type: string
                        enum:
                          - president
                          - president_adjoint
                          - tresorier
                          - secretaire
                          - membre_confirme
                          - membre_junior
      responses:
        '201':
          description: Collectivité créée
        '400':
          description: Conditions non respectées

  /collectivites/{collectiviteId}/membres:
    post:
      summary: Admission d'un membre (B-2)
      description: |
        Conditions :
        - Minimum 2 parrains confirmés
        - Parrains de la collectivité cible >= parrains externes
        - Paiement obligatoire :
            * 50 000 MGA (adhésion)
            * Cotisation annuelle complète
      operationId: admettreMembre
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - parrains
                - nom
                - prenom
                - dateNaissance
                - genre
                - adresse
                - metier
                - telephone
                - email
                - montantAdhesion
                - montantCotisationAnnuelle
              properties:
                parrains:
                  type: array
                  minItems: 2
                  items:
                    type: object
                    required:
                      - membreId
                      - collectiviteId
                      - relation
                    properties:
                      membreId:
                        type: string
                      collectiviteId:
                        type: string
                      relation:
                        type: string
                        enum:
                          - famille
                          - ami
                          - collegue
                          - autre
                nom:
                  type: string
                prenom:
                  type: string
                dateNaissance:
                  type: string
                  format: date
                genre:
                  type: string
                  enum: [feminin, masculin]
                adresse:
                  type: string
                metier:
                  type: string
                telephone:
                  type: string
                email:
                  type: string
                  format: email
                montantAdhesion:
                  type: number
                  example: 50000
                montantCotisationAnnuelle:
                  type: number
      responses:
        '201':
          description: Membre admis
        '400':
          description: Conditions non remplies

  /collectivites/{collectiviteId}/cotisations:
    post:
      summary: Encaisser une cotisation
      operationId: encaisserCotisation
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - membreId
                - montant
                - date
                - modePaiement
                - typeCotisation
              properties:
                membreId:
                  type: string
                montant:
                  type: number
                date:
                  type: string
                  format: date
                modePaiement:
                  type: string
                  enum: [especes, virement_bancaire, mobile_money]
                typeCotisation:
                  type: string
                  enum: [mensuelle, annuelle, ponctuelle]
      responses:
        '201':
          description: Encaissement enregistré

  /collectivites/{collectiviteId}/comptes:
    post:
      summary: Ajouter un compte
      description: Une seule caisse autorisée par collectivité
      operationId: ajouterCompte
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    type:
                      enum: [caisse]
                - type: object
                  properties:
                    type:
                      enum: [bancaire]
                    titulaire:
                      type: string
                    banque:
                      type: string
                    numeroCompte:
                      type: string
                      pattern: '^\d{23}$'
                - type: object
                  properties:
                    type:
                      enum: [mobile_money]
                    titulaire:
                      type: string
                    service:
                      type: string
                      enum: [Orange Money, Mvola, Airtel Money]
                    telephone:
                      type: string
      responses:
        '201':
          description: Compte créé

  /collectivites/{collectiviteId}/activites:
    post:
      summary: Créer une activité
      operationId: creerActivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nom
                - date
                - typeActivite
              properties:
                nom:
                  type: string
                date:
                  type: string
                  format: date
                typeActivite:
                  type: string
                  enum:
                    - assemblee_mensuelle
                    - formation_juniors
                    - exceptionnelle
                obligatoirePour:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Activité créée

  /activites/{activiteId}/presences:
    post:
      summary: Enregistrer présence
      operationId: enregistrerPresence
      parameters:
        - name: activiteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - membreId
                - present
              properties:
                membreId:
                  type: string
                present:
                  type: boolean
                excuse:
                  type: boolean
                motif:
                  type: string
                externe:
                  type: boolean
                  description: Ne compte pas dans l’assiduité
      responses:
        '201':
          description: Présence enregistrée

  /collectivites/{collectiviteId}/statistiques/mensuelles:
    post:
      summary: Rapport mensuel
      operationId: rapportMensuel
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - annee
                - mois
                - tauxAssiduiteGlobal
                - nombreMembres
              properties:
                annee:
                  type: integer
                mois:
                  type: integer
                tauxAssiduiteGlobal:
                  type: number
                nombreMembres:
                  type: integer
      responses:
        '201':
          description: Rapport enregistré

  /federation/statistiques/mensuelles:
    get:
      summary: Statistiques fédération
      description: Statistiques agrégées sur une période donnée
      operationId: statistiquesFederation
      parameters:
        - name: debut
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: fin
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Rapport global
          content:
            application/json:
              schema:
                type: object
                properties:
                  collectivites:
                    type: array
                    items:
                      type: object
                      properties:
                        collectiviteId:
                          type: string
                        nom:
                          type: string
                        tauxAssiduiteGlobal:
                          type: number
                        pourcentageMembresAJour:
                          type: number
                        nombreNouveauxAdherents:
                          type: integer